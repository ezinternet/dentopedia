<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CR vs CO/MIP 기준위 결정 트리</title>
  <style>
    :root {
      --bg: #f5f6fa;
      --card: #ffffff;
      --text: #1a1a2e;
      --text-secondary: #5a5a7a;
      --border: #e0e2ef;
      --accent: #4361ee;
      --accent-light: #eef0fd;
      --radius: 14px;
      --shadow: 0 4px 24px rgba(67,97,238,0.10);
      --blue: #2563eb; --blue-bg: #eff4ff; --blue-border: #b9ccfb;
      --green: #0f9e5e; --green-bg: #edfaf3; --green-border: #a3e6c8;
      --amber: #b45309; --amber-bg: #fffbeb; --amber-border: #fcd34d;
      --red: #c0392b; --red-bg: #fff2f2; --red-border: #f5a8a1;
    }
    /* Light theme fixed — dark-mode auto-switch removed per request (always light). */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Noto Sans KR', 'Segoe UI', sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; display: flex; flex-direction: column; align-items: center;
      padding: 24px 16px 48px; line-height: 1.55;
    }
    header { width: 100%; max-width: 560px; margin-bottom: 18px; text-align: center; }
    h1 { font-size: 1.35rem; margin-bottom: 6px; }
    .sub { color: var(--text-secondary); font-size: 0.86rem; }
    .glossary {
      max-width: 560px; width: 100%; background: var(--accent-light);
      border: 1px solid var(--border); border-radius: var(--radius);
      padding: 12px 16px; margin-bottom: 18px; font-size: 0.8rem; color: var(--text-secondary);
    }
    .glossary b { color: var(--text); }
    .progress { display: flex; gap: 6px; max-width: 560px; width: 100%; margin-bottom: 16px; }
    .pdot { flex: 1; height: 5px; border-radius: 3px; background: var(--border); transition: background .25s; }
    .pdot.active { background: var(--accent); }
    .pdot.done { background: var(--green); }
    .card {
      max-width: 560px; width: 100%; background: var(--card);
      border: 1px solid var(--border); border-radius: var(--radius);
      box-shadow: var(--shadow); padding: 22px; margin-bottom: 14px;
    }
    .qnum { font-size: 0.72rem; letter-spacing: .08em; text-transform: uppercase; color: var(--accent); font-weight: 700; margin-bottom: 8px; }
    .qtext { font-size: 1.08rem; font-weight: 600; margin-bottom: 6px; }
    .qhint { font-size: 0.82rem; color: var(--text-secondary); margin-bottom: 16px; }
    .btns { display: flex; flex-direction: column; gap: 10px; }
    button.opt {
      text-align: left; padding: 13px 16px; border-radius: 10px; cursor: pointer;
      border: 1.5px solid var(--border); background: transparent; color: var(--text);
      font-size: 0.95rem; font-weight: 500; transition: all .15s; font-family: inherit;
    }
    button.opt:hover { border-color: var(--accent); background: var(--accent-light); }
    button.opt .ohint { display:block; font-size:0.78rem; color: var(--text-secondary); font-weight:400; margin-top:3px; }
    .result { border-left-width: 5px; border-left-style: solid; }
    .result.blue { border-left-color: var(--blue); background: var(--blue-bg); }
    .result.green { border-left-color: var(--green); background: var(--green-bg); }
    .result.amber { border-left-color: var(--amber); background: var(--amber-bg); }
    .result.red { border-left-color: var(--red); background: var(--red-bg); }
    .rlabel { font-size: 0.72rem; letter-spacing:.08em; text-transform: uppercase; font-weight: 700; margin-bottom: 6px; }
    .result.blue .rlabel { color: var(--blue); }
    .result.green .rlabel { color: var(--green); }
    .result.amber .rlabel { color: var(--amber); }
    .result.red .rlabel { color: var(--red); }
    .rtitle { font-size: 1.15rem; font-weight: 700; margin-bottom: 10px; }
    .rbody { font-size: 0.92rem; margin-bottom: 12px; }
    .refs { font-size: 0.8rem; color: var(--text-secondary); border-top: 1px dashed var(--border); padding-top: 10px; }
    .refs b { color: var(--text); }
    .refs a { color: var(--accent); text-decoration: none; }
    .note { font-size: 0.8rem; color: var(--text-secondary); margin-top: 10px; padding: 10px 12px; background: var(--bg); border-radius: 8px; }
    .actions { max-width: 560px; width: 100%; display: flex; gap: 10px; margin-top: 4px; }
    .actions button {
      flex: 1; padding: 11px; border-radius: 10px; cursor: pointer; font-family: inherit;
      font-size: 0.9rem; font-weight: 600; border: 1.5px solid var(--border);
      background: var(--card); color: var(--text); transition: all .15s;
    }
    .actions button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    .actions button:hover { opacity: .88; }
    .hidden { display: none; }
    .path { max-width: 560px; width: 100%; font-size: 0.78rem; color: var(--text-secondary); margin-bottom: 10px; }
    .path span { background: var(--accent-light); padding: 2px 8px; border-radius: 6px; margin-right: 4px; display:inline-block; margin-bottom:4px; }
  </style>
</head>
<body>
  <header>
    <h1>교합 재건 기준위 결정 트리</h1>
    <div class="sub">CR/CO(과두 기준) vs MIP/ICP(치아 기준) — 어디로 회복할 것인가</div>
  </header>

  <div class="glossary">
    <b>CR</b> 중심위(Centric Relation, 과두가 관절와에 안정 안착) · <b>CO</b> 중심교합(CR 상태의 교합접촉위) · <b>MIP/MICP/ICP</b> 최대교두감합위(치아 최대 맞물림, 과두 무관) · <b>중심활주</b> CR↔MIP 미끄러짐(CR-ICP discrepancy)
  </div>

  <div class="progress" id="progress">
    <div class="pdot" data-step="1"></div>
    <div class="pdot" data-step="2"></div>
    <div class="pdot" data-step="3"></div>
    <div class="pdot" data-step="4"></div>
  </div>

  <div class="path hidden" id="pathTrail"></div>

  <div id="stage"></div>

  <div class="actions">
    <button id="backBtn" onclick="goBack()">← 뒤로</button>
    <button class="primary" onclick="reset()">처음부터</button>
  </div>

  <script>
    const NOTE = '측정 표준화: MIP 교합접촉 수는 검출지시재에 따라 11–70개로 변동 — 한 가지 지시재(교합지·shimstock·디지털)를 정해 기록하고 재내원 시 재점검 (Qadeer & Türp 2023, J Oral Rehabil).';

    const QUESTIONS = {
      q1: {
        step: 1,
        num: '1단계 / 4',
        text: '전악(또는 대규모) 수복이 필요한가? — 기존 최대교두감합위(MIP)를 잃었거나 바꿔야 하는 상황인가?',
        hint: '광범위 재건은 기존 습관적 교합을 그대로 쓸 수 없으므로 재현 가능한 기준위가 필요하다.',
        opts: [
          { label: '예 — 전악/대규모 재건 (MIP 재설정 필요)', hint: '재현 가능한 기준위로 새 교합을 구축해야 함', go: 'rBlue' },
          { label: '아니오 — 기존 사용 가능한 MIP가 있음', hint: '소규모 수복·진단 단계', go: 'q2' },
        ]
      },
      q2: {
        step: 2,
        num: '2단계 / 4',
        text: '과두가 건강·안정적이고 악관절장애(TMD) 징후가 없는가?',
        hint: '과두 변형·디스크 변위·관절잡음·통증이 있으면 과두 안착(CR)을 기준으로 신뢰할 수 없다.',
        opts: [
          { label: '아니오 — 과두 변형/불안정 또는 TMD 징후 있음', hint: '관절잡음·디스크 변위·통증·과두 변형', go: 'rRed' },
          { label: '예 — 과두 안정·무증상', hint: '정상 관절', go: 'q3' },
        ]
      },
      q3: {
        step: 3,
        num: '3단계 / 4',
        text: 'CR–MIP 중심활주가 작고(시상 < 2 mm) 무증상인가?',
        hint: 'Pullinger 기준 무증상자에서 시상 활주 > 2 mm는 거의 없다 (Fornai 2022). 작은 활주는 정상.',
        opts: [
          { label: '예 — 활주 < 2 mm, 무증상', hint: '생물학적으로 수용 가능한 범위', go: 'rGreen' },
          { label: '아니오 — 활주 > 2 mm / hyperdivergent 골격 / 증상', hint: '경계 신호 — 추가 평가 필요', go: 'rAmber' },
        ]
      },
    };

    const RESULTS = {
      rBlue: {
        cls: 'blue', label: '권고 기준위', step: 1,
        title: '재현 가능한 CR / CO 로 구축',
        body: '전악·대규모 재건에서는 기존 습관적 MIP를 재현 기준으로 쓸 수 없다. 대다수 환자에서 CO와 MIP는 불일치하므로(Best Evidence Consensus), <b>재현 가능한 중심교합(CO)/중심위(CR)</b>를 build 기준위로 채택해 새 교합을 구성한다. 기능 중심 변형으로는 <b>정상화된 저작위치 정점</b>을 치료위로 잡는 방법도 장기 안정적이다.',
        refs: 'Kattadiyil 2021 (BECS, J Prosthodont) — 전악수복은 CO로 회복 · <a href="https://doi.org/10.1111/jopr.13316" target="_blank">DOI</a> | Goldstein 2022 — CR은 재현 가능·필요한 기준위 · <a href="https://doi.org/10.1111/jopr.13603" target="_blank">DOI</a> | Kwak 2025 — 저작위 중심 교합 10년 안정 · <a href="https://doi.org/10.21851/obr.25.008" target="_blank">DOI</a>'
      },
      rRed: {
        cls: 'red', label: '권고 기준위', step: 2,
        title: '근육 유도 안정 ICP + 과두위 추적',
        body: '과두가 변형·불안정하면 CR(과두 안착)은 신뢰할 수 없다. <b>조기접촉 없이 습관성 폐구운동이 종료되는 안정적 ICP</b>를 과두 위치가 아닌 근육 유도 하악위로 확보한다(스플린트 평형화 → 보철 이전). 교합을 바꾸면 과두-관절와 관계가 변하므로 치료 중·후 <b>과두위와 하악기능을 능동 모니터링</b>한다(의원성 위험 회피).',
        refs: 'Fukushima 2016 (25년 추적 증례) — 불안정 과두 → 근육 유도 ICP · <a href="https://doi.org/10.1016/j.jdsr.2016.02.001" target="_blank">DOI</a> | Fornai 2022 — 과두위 모니터링·Reference Position · <a href="https://doi.org/10.1111/joor.13329" target="_blank">DOI</a>'
      },
      rGreen: {
        cls: 'green', label: '권고 기준위', step: 3,
        title: '기존 MIP 수용',
        body: '건강한 유치악 + 작은 무증상 활주(< 2 mm)라면, 기존 <b>최대교두감합위(MIP)는 생물학적으로 수용 가능</b>하다. 일상적 과두 재위치(repositioning)나 광범위 진단 절차는 불필요. 작은 중심활주는 정상 소견이다.',
        refs: 'Zonnenberg/Türp/Greene 2021 — 건강 유치악자는 MIP가 생물학적으로 수용 가능 · <a href="https://doi.org/10.1111/joor.13215" target="_blank">DOI</a>'
      },
      rAmber: {
        cls: 'amber', label: '경계 — 추가 평가', step: 3,
        title: 'Flag → 기능·과두 평가 우선',
        body: '활주 > 2 mm, 과두발산형(hyperdivergent) 골격, 또는 증상이 있으면 경계 신호다. 교합을 바꾸기 전 <b>전반적 기능·과두 변위 평가</b>를 먼저 시행한다. hyperdivergent 패턴은 CR→MIP 과두 후하방 변위의 최대 위험인자다(임상적 유의 변위 ≥2 mm 시상/수평, ≥0.5 mm 횡).',
        refs: 'Radej 2023 (scoping review) — hyperdivergent = CR→MIP 변위 위험 · <a href="https://doi.org/10.3390/jcm12020689" target="_blank">DOI</a> | Fornai 2022 — 활주 컷오프 ≈2 mm · <a href="https://doi.org/10.1111/joor.13329" target="_blank">DOI</a> | Jiménez-Silva 2017 — CR-ICP↔TMD 근거 낮음 · <a href="https://doi.org/10.1080/00016357.2017.1340667" target="_blank">DOI</a>'
      },
    };

    let history = [];     // stack of node keys visited (questions)
    let current = 'q1';

    function render() {
      const stage = document.getElementById('stage');
      updateProgress();
      updatePath();
      document.getElementById('backBtn').style.visibility = history.length ? 'visible' : 'hidden';

      if (QUESTIONS[current]) {
        const q = QUESTIONS[current];
        stage.innerHTML = `
          <div class="card">
            <div class="qnum">${q.num}</div>
            <div class="qtext">${q.text}</div>
            <div class="qhint">${q.hint}</div>
            <div class="btns">
              ${q.opts.map((o,i)=>`<button class="opt" onclick="choose('${o.go}', '${escapeAttr(o.label)}')">${o.label}<span class="ohint">${o.hint}</span></button>`).join('')}
            </div>
          </div>`;
      } else if (RESULTS[current]) {
        const r = RESULTS[current];
        stage.innerHTML = `
          <div class="card result ${r.cls}">
            <div class="rlabel">${r.label}</div>
            <div class="rtitle">${r.title}</div>
            <div class="rbody">${r.body}</div>
            <div class="refs"><b>근거</b> — ${r.refs}</div>
            <div class="note">${NOTE}</div>
          </div>`;
      }
    }

    function escapeAttr(s){ return s.replace(/'/g,"\\'"); }

    function choose(go, label) {
      history.push({ from: current, label });
      current = go;
      render();
    }
    function goBack() {
      if (!history.length) return;
      const prev = history.pop();
      current = prev.from;
      render();
    }
    function reset() {
      history = []; current = 'q1'; render();
    }
    function updateProgress() {
      const stepNow = QUESTIONS[current] ? QUESTIONS[current].step : (RESULTS[current] ? RESULTS[current].step : 4);
      document.querySelectorAll('.pdot').forEach(d => {
        const s = +d.dataset.step;
        d.classList.toggle('done', s < stepNow);
        d.classList.toggle('active', s === stepNow);
      });
    }
    function updatePath() {
      const trail = document.getElementById('pathTrail');
      if (!history.length) { trail.classList.add('hidden'); return; }
      trail.classList.remove('hidden');
      trail.innerHTML = history.map(h => `<span>${h.label.split(' — ')[0]}</span>`).join('→ ');
    }

    render();
  </script>
</body>
</html>
