name: Deploy Quartz site to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "wiki/**"
      - "interactives/**"
      - "index.md"
      - "quartz/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Stamp last-updated time and counts into wiki/index.md (homepage)
        run: |
          STAMP=$(TZ='Asia/Seoul' date '+%Y-%m-%d %H:%M KST')
          PAPER_COUNT=$(ls sources/*.md 2>/dev/null | wc -l | tr -d ' ')
          OVERVIEW_COUNT=$(ls wiki/overviews/*.md 2>/dev/null | wc -l | tr -d ' ')
          CATEGORY_COUNT=$(find wiki -mindepth 1 -maxdepth 2 -type d | grep -v overviews | wc -l | tr -d ' ')
          INTERACTIVE_COUNT=$(ls interactives/*.html 2>/dev/null | grep -v 'wiki-evolution\|wiki-growth\|wiki-stats\|overviews-map\|contradiction-radar\|index\.html' | wc -l | tr -d ' ')
          # 논쟁 레이더 debate 수: 커밋된 radar HTML의 '<b>N</b> 논쟁'에서 추출(빌드가 항상 최신 유지).
          DEBATE_COUNT=$(grep -oE '<b>[0-9]+</b> 논쟁' interactives/contradiction-radar.html 2>/dev/null | head -1 | grep -oE '[0-9]+' || echo 0)
          sed -i "s|<!-- LAST_UPDATED -->.*<!-- /LAST_UPDATED -->|<!-- LAST_UPDATED -->${STAMP}<!-- /LAST_UPDATED -->|" wiki/index.md
          sed -i "s|<!-- PAPER_COUNT -->.*<!-- /PAPER_COUNT -->|<!-- PAPER_COUNT -->${PAPER_COUNT}<!-- /PAPER_COUNT -->|" wiki/index.md
          sed -i "s|<!-- OVERVIEW_COUNT -->.*<!-- /OVERVIEW_COUNT -->|<!-- OVERVIEW_COUNT -->${OVERVIEW_COUNT}<!-- /OVERVIEW_COUNT -->|" wiki/index.md
          sed -i "s|<!-- CATEGORY_COUNT -->.*<!-- /CATEGORY_COUNT -->|<!-- CATEGORY_COUNT -->${CATEGORY_COUNT}<!-- /CATEGORY_COUNT -->|" wiki/index.md
          sed -i "s|<!-- INTERACTIVE_COUNT -->.*<!-- /INTERACTIVE_COUNT -->|<!-- INTERACTIVE_COUNT -->${INTERACTIVE_COUNT}<!-- /INTERACTIVE_COUNT -->|" wiki/index.md
          sed -i "s|<!-- DEBATE_COUNT -->.*<!-- /DEBATE_COUNT -->|<!-- DEBATE_COUNT -->${DEBATE_COUNT}<!-- /DEBATE_COUNT -->|" wiki/index.md

      - name: Regenerate category map from folder counts
        run: |
          # wiki/category-map.md의 '페이지' 열 숫자를 각 카테고리 폴더의 *.md 개수로
          # 다시 채운다. 6단계 그룹핑·비고는 스크립트 STRUCTURE가 SSOT.
          # Quartz가 markdown을 복사하기 전에 실행해야 갱신본이 사이트에 반영됨.
          python3 scripts/build-category-map.py

      - name: Copy wiki/ into quartz/content/
        run: |
          rm -rf quartz/content
          mkdir -p quartz/content
          cp -r wiki/. quartz/content/
          # Homepage = wiki/index.md (curated landing).
          # 루트 index.md(1,200+ 링크 거대 카탈로그)는 그래프 super-hub를 만들어
          # 전역 그래프 force 시뮬레이션을 깨뜨리므로 사이트에 미배포 (Obsidian vault home 전용).

      - name: Install Quartz dependencies
        working-directory: ./quartz
        run: npm ci || npm install

      - name: Build Quartz
        working-directory: ./quartz
        run: npx quartz build

      - name: Regenerate overviews domain map from frontmatter
        run: |
          # interactives/overviews-map.html을 wiki/overviews/*.md frontmatter에서
          # 자동 생성 → 홈(index.md)의 iframe이 항상 최신 overview를 반영.
          # 새 overview 추가 시 수기 카드 편집 불필요.
          python3 scripts/build-overviews-map.py

      - name: Regenerate contradiction radar from typed relations edges
        run: |
          # interactives/contradiction-radar.html을 wiki/**/*.md frontmatter의
          # relations: contradicts/refines typed edge에서 자동 생성 → 위키 내부
          # 상충 근거(회색지대) 지도가 배포 때마다 최신. contradicts edge를 단 논문이
          # 추가되면 카드가 자동 생성됨. interactives-index 생성보다 먼저 실행해야
          # 새 도구가 색인에 잡힘 (category: meta 버킷).
          python3 scripts/build-contradiction-radar.py

      - name: Regenerate live wiki-stats dashboard from repo state
        run: |
          # interactives/wiki-stats-live.html을 리포 실측치(논문/overview/카테고리/
          # 발행연도 히스토그램 + git add-date 누적 곡선)로 재생성 → 메타·통계 도구가
          # 배포 때마다 최신. 날짜 박힌 v1~v4·growth-curve 스냅샷은 진화 이력으로 동결.
          # git 누적 곡선은 full history 필요 → 위 checkout fetch-depth:0 전제.
          # interactives-index 생성보다 먼저 실행해야 새 라이브 도구가 색인에 잡힘.
          python3 scripts/build-wiki-stats.py

      - name: Regenerate interactives index from frontmatter
        run: |
          # interactives/index.html을 각 도구의 주석 frontmatter(category 등)에서
          # 자동 생성 → 수기 카드 추가 누락(invisible) 재발 방지.
          python3 scripts/build-interactives-index.py

      - name: Interactive clinical-tool staleness signal (non-blocking)
        if: always()
        run: |
          # 임상 도구의 source_wiki 근거가 도구보다 최신이면 'STALE'(재작성 후보),
          # 근거 경로가 사라졌으면 'BROKEN' 신호를 빌드 로그에 출력. 임상 수치는 LLM이
          # 추출해야 안전하므로(Rule #1) 자동 재작성하지 않고 신호만 — 배포는 막지 않음.
          python3 scripts/interactive-staleness.py || true

      - name: Copy interactives/ into site (served verbatim)
        run: |
          # Standalone self-contained HTML tools — served as-is at /interactives/,
          # NOT processed by Quartz (they are full HTML docs, not markdown pages).
          if [ -d interactives ]; then
            mkdir -p quartz/public/interactives
            cp -r interactives/. quartz/public/interactives/
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: quartz/public

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-22.04
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
