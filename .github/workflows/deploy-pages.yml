name: Deploy Quartz site to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "wiki/**"
      - "interactives/**"
      - "index.md"
      - "quartz/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Stamp last-updated time and counts into wiki/index.md (homepage)
        run: |
          STAMP=$(TZ='Asia/Seoul' date '+%Y-%m-%d %H:%M KST')
          PAPER_COUNT=$(ls sources/*.md 2>/dev/null | wc -l | tr -d ' ')
          OVERVIEW_COUNT=$(ls wiki/overviews/*.md 2>/dev/null | wc -l | tr -d ' ')
          sed -i "s|<!-- LAST_UPDATED -->.*<!-- /LAST_UPDATED -->|<!-- LAST_UPDATED -->${STAMP}<!-- /LAST_UPDATED -->|" wiki/index.md
          sed -i "s|<!-- PAPER_COUNT -->.*<!-- /PAPER_COUNT -->|<!-- PAPER_COUNT -->${PAPER_COUNT}<!-- /PAPER_COUNT -->|" wiki/index.md
          sed -i "s|<!-- OVERVIEW_COUNT -->.*<!-- /OVERVIEW_COUNT -->|<!-- OVERVIEW_COUNT -->${OVERVIEW_COUNT}<!-- /OVERVIEW_COUNT -->|" wiki/index.md

      - name: Copy wiki/ into quartz/content/
        run: |
          rm -rf quartz/content
          mkdir -p quartz/content
          cp -r wiki/. quartz/content/
          # Homepage = wiki/index.md (curated landing).
          # 루트 index.md(1,200+ 링크 거대 카탈로그)는 그래프 super-hub를 만들어
          # 전역 그래프 force 시뮬레이션을 깨뜨리므로 사이트에 미배포 (Obsidian vault home 전용).

      - name: Install Quartz dependencies
        working-directory: ./quartz
        run: npm ci || npm install

      - name: Build Quartz
        working-directory: ./quartz
        run: npx quartz build

      - name: Regenerate overviews domain map from frontmatter
        run: |
          # interactives/overviews-map.html을 wiki/overviews/*.md frontmatter에서
          # 자동 생성 → 홈(index.md)의 iframe이 항상 최신 overview를 반영.
          # 새 overview 추가 시 수기 카드 편집 불필요.
          python3 scripts/build-overviews-map.py

      - name: Regenerate interactives index from frontmatter
        run: |
          # interactives/index.html을 각 도구의 주석 frontmatter(category 등)에서
          # 자동 생성 → 수기 카드 추가 누락(invisible) 재발 방지.
          python3 scripts/build-interactives-index.py

      - name: Copy interactives/ into site (served verbatim)
        run: |
          # Standalone self-contained HTML tools — served as-is at /interactives/,
          # NOT processed by Quartz (they are full HTML docs, not markdown pages).
          if [ -d interactives ]; then
            mkdir -p quartz/public/interactives
            cp -r interactives/. quartz/public/interactives/
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: quartz/public

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-22.04
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
