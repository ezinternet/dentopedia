name: Deploy Quartz site to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "wiki/**"
      - "index.md"
      - "quartz/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Copy wiki/ into quartz/content/ (cp instead of symlink for reliability)
        run: |
          rm -rf quartz/content
          mkdir -p quartz/content
          cp -r wiki/. quartz/content/
          echo "=== content/ root listing ==="
          ls -la quartz/content/ | head -25
          echo "=== content/index.md exists? ==="
          ls -la quartz/content/index.md
          echo "=== content/index.md first 10 lines ==="
          head -10 quartz/content/index.md

      - name: Install Quartz dependencies
        working-directory: ./quartz
        run: npm ci || npm install

      - name: Build Quartz
        working-directory: ./quartz
        run: npx quartz build

      - name: Inspect build output
        run: |
          echo "=== public/ root listing ==="
          ls -la quartz/public/ | head -30
          echo "=== public/index.html exists? ==="
          ls -la quartz/public/index.html 2>&1 || echo "MISSING"
          echo "=== public/implants/ exists? ==="
          ls -la quartz/public/implants/ 2>&1 | head -5 || echo "MISSING"
          echo "=== total files in public/ ==="
          find quartz/public -type f | wc -l

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: quartz/public

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-22.04
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
