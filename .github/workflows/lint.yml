name: Wiki Lint

on:
  push:
    paths:
      - "wiki/**/*.md"
      - "sources/**/*.md"
      - "papers/*.pdf"
      - "index.md"
      - "scripts/lint.py"
      - "scripts/orphan-check.py"
      - "scripts/find-no-wiki.py"
      - "scripts/supersession-audit.py"
  pull_request:
    paths:
      - "wiki/**/*.md"
      - "sources/**/*.md"

jobs:
  lint:
    name: Frontmatter Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run frontmatter lint
        run: python3 scripts/lint.py

      - name: Run orphan check
        run: python3 scripts/orphan-check.py

      - name: Find papers without wiki
        run: python3 scripts/find-no-wiki.py

      - name: Supersession audit (dangling links & banner-desync → fail; decay → pass)
        run: python3 scripts/supersession-audit.py --ci
